<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>In Another Life</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1a0033, #330066);
            color: white;
            text-align: center;
            padding: 40px 20px;
            margin: 0;
            min-height: 100vh;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: rgba(0,0,0,0.75);
            padding: 40px;
            border-radius: 25px;
            box-shadow: 0 0 40px rgba(255, 100, 255, 0.5);
        }
        h1 { font-size: 2.8em; margin: 10px 0; }
        p.owner { font-size: 1.1em; opacity: 0.9; margin-bottom: 30px; }
        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            border-radius: 15px;
        }
        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        .lyrics {
            margin-top: 40px;
            text-align: left;
            background: rgba(255,255,255,0.1);
            padding: 25px;
            border-radius: 15px;
            line-height: 1.9;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>In Another Life</h1>
        <p class="owner">Song for KSL</p>
        
        <div class="video-wrapper">
            <iframe src="https://www.youtube.com/embed/oXEyW4rA4Z8" 
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                    allowfullscreen></iframe>
        </div>
        
        <div class="lyrics">
            <strong>Lyrics:</strong><br><br>
            In another life, I would be your girl<br>
            We'd keep all our promises, be us against the world<br>
            In another life, I would make you stay<br>
            So I don't have to say you were the one that got away
        </div>
    </div>
</body>
</html>
